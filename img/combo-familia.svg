<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Caixa de pizza -->
  <rect x="50" y="80" width="140" height="120" fill="#CD853F" stroke="#8B4513" stroke-width="2" rx="3"/>
  <!-- Texto caixa -->
  <text x="120" y="110" text-anchor="middle" font-size="12" font-family="Arial" font-weight="bold" fill="#FFF">PIZZA</text>
  <!-- Pizza dentro (vista superior) -->
  <circle cx="120" cy="145" r="50" fill="#D2691E"/>
  <circle cx="100" cy="140" r="8" fill="#FFD700"/>
  <circle cx="140" cy="140" r="8" fill="#FFD700"/>
  <circle cx="110" cy="160" r="7" fill="#DC143C"/>
  <circle cx="130" cy="160" r="7" fill="#DC143C"/>
  <!-- Garrafa de refrigerante -->
  <rect x="210" y="60" width="50" height="100" fill="#FF8C00" stroke="#FF6F00" stroke-width="2" rx="4"/>
  <ellipse cx="235" cy="60" rx="25" ry="8" fill="#D68000"/>
  <rect x="225" y="50" width="20" height="12" fill="#C0C0C0"/>
  <!-- Liquido -->
  <rect x="215" y="80" width="40" height="75" fill="#FF6347"/>
  <!-- Sobremesa (pudim/mousse) -->
  <ellipse cx="280" cy="240" rx="35" ry="25" fill="#8B6914"/>
  <rect x="245" y="265" width="70" height="15" fill="#D2B48C" rx="3"/>
  <!-- Texto sobremesa -->
  <text x="280" y="273" text-anchor="middle" font-size="10" font-family="Arial" fill="#fff">Sobremesa</text>
  <!-- Brinde/presente -->
  <path d="M 100 280 L 120 240 L 140 280 Z" fill="#FFD700" stroke="#FFC700" stroke-width="2"/>
  <rect x="105" y="235" width="30" height="10" fill="#FF6B6B" stroke="#FF5252" stroke-width="1"/>
  <!-- Texto brinde -->
  <text x="120" y="310" text-anchor="middle" font-size="11" font-family="Arial" fill="#333">+ Brinde</text>
  <!-- Avaliação/coração -->
  <path d="M 300 290 L 310 280 L 320 290 L 315 300 L 310 305 L 305 300 Z" fill="#FF1493"/>
  <!-- Preço/valor destaque -->
  <rect x="140" y="330" width="120" height="40" fill="#FFD700" stroke="#FFC700" stroke-width="2" rx="5"/>
  <text x="200" y="350" text-anchor="middle" font-size="16" font-family="Arial" font-weight="bold" fill="#FF6F00">COMBO</text>
  <text x="200" y="365" text-anchor="middle" font-size="11" font-family="Arial" fill="#333">FAMÍLIA</text>
</svg>