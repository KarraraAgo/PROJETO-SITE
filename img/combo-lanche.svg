<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Hambúrguer central -->
  <!-- Pão superior -->
  <ellipse cx="200" cy="100" rx="70" ry="30" fill="#D2691E"/>
  <circle cx="160" cy="90" r="4" fill="#8B4513"/>
  <circle cx="200" cy="85" r="4" fill="#8B4513"/>
  <circle cx="240" cy="90" r="4" fill="#8B4513"/>
  <!-- Alface -->
  <ellipse cx="200" cy="140" rx="75" ry="12" fill="#228B22"/>
  <!-- Queijo -->
  <rect x="125" y="160" width="150" height="10" fill="#FFD700"/>
  <!-- Hambúrguer -->
  <rect x="115" y="180" width="170" height="25" fill="#8B4513" rx="3"/>
  <!-- Pão inferior -->
  <ellipse cx="200" cy="230" rx="70" ry="25" fill="#D2691E"/>
  <!-- Batatas fritas (lado esquerdo) -->
  <rect x="50" y="140" width="60" height="100" fill="#D2691E" stroke="#8B4513" stroke-width="2" rx="3"/>
  <!-- Batatas dentro -->
  <line x1="70" y1="150" x2="65" y2="220" stroke="#DAA520" stroke-width="8" stroke-linecap="round"/>
  <line x1="85" y1="145" x2="80" y2="225" stroke="#DAA520" stroke-width="8" stroke-linecap="round"/>
  <line x1="100" y1="150" x2="95" y2="230" stroke="#DAA520" stroke-width="8" stroke-linecap="round"/>
  <line x1="65" y1="170" x2="105" y2="165" stroke="#DAA520" stroke-width="7" stroke-linecap="round"/>
  <line x1="62" y1="195" x2="103" y2="190" stroke="#DAA520" stroke-width="7" stroke-linecap="round"/>
  <!-- Refrigerante (lado direito) -->
  <rect x="290" y="140" width="60" height="100" fill="#FF8C00" stroke="#FF6F00" stroke-width="2" rx="3"/>
  <!-- Liquido -->
  <rect x="295" y="155" width="50" height="78" fill="#FF6347"/>
  <!-- Tampa -->
  <ellipse cx="320" cy="140" rx="30" ry="8" fill="#D68000"/>
  <!-- Canudo -->
  <rect x="312" y="80" width="6" height="60" fill="#FF69B4" rx="3"/>
  <!-- Brilho -->
  <ellipse cx="310" cy="170" rx="8" ry="20" fill="white" opacity="0.2"/>
  <!-- Caixa de entrega/embalagem -->
  <rect x="120" y="310" width="160" height="50" fill="#CD853F" stroke="#8B4513" stroke-width="2" rx="4"/>
  <!-- Divisão da caixa -->
  <line x1="160" y1="310" x2="160" y2="360" stroke="#8B4513" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="310" x2="240" y2="360" stroke="#8B4513" stroke-width="1" opacity="0.5"/>
  <!-- Texto -->
  <text x="140" y="340" text-anchor="middle" font-size="10" font-family="Arial" fill="#fff" font-weight="bold">Lanche</text>
  <text x="200" y="340" text-anchor="middle" font-size="10" font-family="Arial" fill="#fff" font-weight="bold">Batata</text>
  <text x="260" y="340" text-anchor="middle" font-size="10" font-family="Arial" fill="#fff" font-weight="bold">Bebida</text>
  <!-- Destaque/Promoção -->
  <rect x="140" y="370" width="120" height="25" fill="#FFD700" stroke="#FFC700" stroke-width="2" rx="3"/>
  <text x="200" y="387" text-anchor="middle" font-size="13" font-family="Arial" font-weight="bold" fill="#FF6F00">COMBO LANCHE</text>
</svg>