<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pizzaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="70%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#pizzaGrad)"/>
  <circle cx="200" cy="200" r="170" fill="#F4A460"/>
  <!-- Presunto (rosa) -->
  <circle cx="150" cy="150" r="20" fill="#FFB6C1"/>
  <circle cx="250" cy="170" r="22" fill="#FFB6C1"/>
  <circle cx="200" cy="270" r="18" fill="#FFB6C1"/>
  <!-- Ovo -->
  <ellipse cx="180" cy="200" rx="25" ry="30" fill="#FFFACD"/>
  <circle cx="180" cy="200" r="8" fill="#FFD700"/>
  <!-- Azeitona -->
  <circle cx="240" cy="240" r="12" fill="#2F4F4F"/>
  <circle cx="160" cy="260" r="11" fill="#2F4F4F"/>
  <!-- Cebola -->
  <circle cx="220" cy="150" r="10" fill="#FFE4B5"/>
  <!-- Mussarela -->
  <ellipse cx="200" cy="220" rx="35" ry="28" fill="#FFF8DC" opacity="0.7"/>
  <!-- Borda -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#8B4513" stroke-width="15"/>
  <text x="200" y="380" text-anchor="middle" font-size="18" font-family="Arial" fill="#333">Pizza Portuguesa</text>
</svg>