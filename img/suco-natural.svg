<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="juiceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E0F7FA;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#B2EBF2;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Copo (vidro) -->
  <path d="M 120 100 L 100 280 Q 100 310 130 310 L 270 310 Q 300 310 300 280 L 280 100 Z" fill="url(#glassGradient)" stroke="#80DEEA" stroke-width="2"/>
  <!-- Liquido do suco -->
  <path d="M 120 180 L 100 280 Q 100 305 130 305 L 270 305 Q 300 305 300 280 L 280 180 Z" fill="url(#juiceGradient)"/>
  <!-- Brilho do vidro -->
  <ellipse cx="140" cy="150" rx="20" ry="100" fill="white" opacity="0.3"/>
  <!-- Gelo/cubos de gelo -->
  <rect x="130" y="140" width="20" height="20" fill="#B3E5FC" opacity="0.7" transform="rotate(20 140 150)"/>
  <rect x="200" y="160" width="18" height="18" fill="#B3E5FC" opacity="0.7" transform="rotate(-15 209 169)"/>
  <!-- Canudo -->
  <rect x="185" y="50" width="8" height="150" fill="#FF69B4" rx="4"/>
  <rect x="187" y="50" width="4" height="150" fill="#FF1493" rx="2"/>
  <!-- Espuma/espuma de suco no topo -->
  <circle cx="170" cy="115" r="8" fill="#FFB366" opacity="0.8"/>
  <circle cx="190" cy="110" r="7" fill="#FFB366" opacity="0.8"/>
  <circle cx="220" cy="115" r="6" fill="#FFB366" opacity="0.8"/>
  <!-- Fatia de laranja (decoração) -->
  <circle cx="260" cy="115" r="20" fill="#FFA500"/>
  <circle cx="260" cy="115" r="18" fill="#FFD700"/>
  <!-- Linhas das fatias -->
  <line x1="260" y1="95" x2="260" y2="135" stroke="#FFA500" stroke-width="1"/>
  <line x1="240" y1="115" x2="280" y2="115" stroke="#FFA500" stroke-width="1"/>
  <line x1="245" y1="100" x2="275" y2="130" stroke="#FFA500" stroke-width="1"/>
  <line x1="245" y1="130" x2="275" y2="100" stroke="#FFA500" stroke-width="1"/>
  <!-- Base do copo -->
  <ellipse cx="200" cy="310" rx="85" ry="15" fill="#B0BEC5"/>
  <!-- Condensação -->
  <circle cx="140" cy="200" r="3" fill="#B3E5FC" opacity="0.5"/>
  <circle cx="150" cy="240" r="3" fill="#B3E5FC" opacity="0.5"/>
  <circle cx="255" cy="220" r="3" fill="#B3E5FC" opacity="0.5"/>
  <text x="200" y="360" text-anchor="middle" font-size="14" font-family="Arial" fill="#333">Suco Natural</text>
</svg>