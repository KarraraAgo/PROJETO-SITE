<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pizzaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="70%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#pizzaGrad)"/>
  <circle cx="200" cy="200" r="170" fill="#F4A460"/>
  <!-- Queijos variados -->
  <!-- Branco -->
  <ellipse cx="150" cy="160" rx="30" ry="25" fill="#F5F5DC"/>
  <!-- Amarelo -->
  <ellipse cx="240" cy="180" rx="28" ry="24" fill="#FFD700"/>
  <!-- Azul (Gorgonzola) -->
  <ellipse cx="200" cy="260" rx="35" ry="30" fill="#B0E0E6"/>
  <!-- Parmesão -->
  <ellipse cx="180" cy="220" rx="25" ry="22" fill="#EEE8AA"/>
  <!-- Mussarela -->
  <ellipse cx="220" cy="220" rx="28" ry="24" fill="#FFF8DC" opacity="0.7"/>
  <!-- Borda -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#8B4513" stroke-width="15"/>
  <text x="200" y="380" text-anchor="middle" font-size="16" font-family="Arial" fill="#333">Pizza 4 Queijos</text>
</svg>